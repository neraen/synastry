<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lunestia — Astral Hero</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #120A24;
    --bg-2: #1A1233;
    --border: rgba(255,255,255,0.07);
    --border-strong: rgba(255,255,255,0.12);

    --gold: #E5C266;
    --gold-2: #F0D585;
    --gold-dim: #B89549;

    --text: #ECE5F7;
    --text-2: #BDB2D4;
    --text-3: #8A82A6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .stage {
    min-height: 100dvh;
    display: flex;
    align-items: stretch;
    justify-content: center;
    background:
      radial-gradient(1200px 700px at 20% -10%, rgba(155,92,255,0.10), transparent 60%),
      radial-gradient(900px 600px at 110% 110%, rgba(229,194,102,0.06), transparent 60%),
      var(--bg);
  }
  .phone {
    width: 100%;
    max-width: 440px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (min-width: 520px) {
    .phone {
      margin: 24px 0;
      border-radius: 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 30px 80px rgba(0,0,0,0.5);
      max-height: calc(100dvh - 48px);
    }
  }

  .scroll {
    position: relative;
    z-index: 1;
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 20px 20px 40px;
    display: flex;
    flex-direction: column;
  }
  .scroll::-webkit-scrollbar { display: none; }
  .scroll { scrollbar-width: none; }

  .page-title {
    font-family: "DM Serif Display", serif;
    font-size: 22px;
    color: var(--text);
    text-align: center;
    margin: 4px 0 6px;
  }
  .page-sub {
    text-align: center;
    color: var(--text-2);
    font-size: 13.5px;
    margin: 0 0 18px;
  }

  /* ===== AstralHero styles (REUSE in any host page) ===== */
  .hero {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
    margin: 12px 0;
  }
  .stats-col {
    display: flex;
    flex-direction: column;
    gap: 26px;
    padding-top: 6px;
    min-width: 0;
  }
  .stats-col.left  { text-align: right; align-items: flex-end; }
  .stats-col.right { text-align: left;  align-items: flex-start; }

  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stats-col.left .stat  { align-items: flex-end; }
  .stats-col.right .stat { align-items: flex-start; }

  .stat-label-row {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--gold-dim);
  }
  .stat-label-row svg { width: 11px; height: 11px; flex-shrink: 0; }
  .stat-label {
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-dim);
    font-weight: 700;
    line-height: 1;
    font-family: "Plus Jakarta Sans", sans-serif;
  }
  .stat-value {
    font-family: "Plus Jakarta Sans", sans-serif;
    font-size: 14.5px;
    color: var(--text);
    font-weight: 600;
    line-height: 1.2;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    letter-spacing: 0.005em;
  }
  .stat-value .sign-glyph {
    display: inline-flex;
    align-items: center;
    color: var(--gold);
    flex-shrink: 0;
  }
  .stat-value .sign-glyph svg { width: 13px; height: 13px; }
  .stat-value.dual {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: inherit;
  }
  .stats-col.right .stat-value.dual { align-items: flex-start; }
  .stats-col.left  .stat-value.dual { align-items: flex-end; }
  .stat-value.dual > span {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  /* Avatar diamond */
  .avatar-frame {
    position: relative;
    width: 210px; height: 230px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
  }
  .avatar-glow {
    position: absolute; inset: -10px;
    border-radius: 30% / 30%;
    background:
      radial-gradient(120px 130px at 50% 50%, rgba(229,194,102,0.22), rgba(155,92,255,0.10) 50%, transparent 70%);
    filter: blur(2px);
    pointer-events: none;
  }
  .avatar-img {
    width: 100%; height: 100%;
    object-fit: contain;
    position: relative;
    z-index: 2;
    animation: avatarFloat 6s ease-in-out infinite;
  }
  @keyframes avatarFloat {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-5px); }
  }
  .avatar-frame::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(229,194,102,0.22);
    transform: rotate(45deg);
    border-radius: 8px;
    pointer-events: none;
    z-index: 1;
  }
  .avatar-frame::after {
    content: "";
    position: absolute;
    inset: 16px;
    border: 1px solid rgba(155,92,255,0.20);
    transform: rotate(45deg);
    border-radius: 4px;
    pointer-events: none;
    z-index: 1;
  }
  .avatar-frame .twinkle-dot {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 99px;
    background: var(--gold);
    box-shadow: 0 0 8px rgba(229,194,102,0.6);
    animation: twinkle 3s ease-in-out infinite;
    z-index: 3;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50%      { opacity: 0.8; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- shared modules: data + glyphs + reusable hero component -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="astro-glyphs.jsx"></script>
  <script type="text/babel" src="astral-hero.jsx"></script>

  <!-- mount -->
  <script type="text/babel">
    function Page() {
      return (
        <div className="stage">
          <div className="phone">
            <div className="scroll">
              <h1 className="page-title">Astral Hero</h1>
              <p className="page-sub">Composant réutilisable — avatar + stats clés</p>
              <AstralHero avatarSrc="assets/avatar-lion.png" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
  </script>
</body>
</html>

server {
    listen 80;
    root /var/www/public;
    index index.php;

    fastcgi_buffer_size 128k;
    fastcgi_buffers 4 256k;
    fastcgi_busy_buffers_size 256k;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        # Résolution dynamique via le DNS embarqué de Docker : sans elle, nginx
        # fige l'IP du conteneur "app" à son démarrage et sert des 502 après
        # chaque recreate de app tant que web n'est pas redémarré.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $php_upstream app:9000;
        fastcgi_pass $php_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
        internal;
    }

    location ~ \.php$ { return 404; }
    location ~ /\. { deny all; }
}
# =============================================================================
# AstroMatch Backend - Production Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM Application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: astromatch_app
    restart: always
    environment:
      - APP_ENV=prod
      - APP_DEBUG=0
    env_file:
      - .env.prod
    volumes:
      - ./var/log:/var/www/var/log
      - ./config/jwt:/var/www/config/jwt:ro
      - php_logs:/var/log/php
    networks:
      - astromatch
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Nginx Web Server (internal only — traffic comes from host nginx via proxy_network)
  # ---------------------------------------------------------------------------
  web:
    image: nginx:alpine
    container_name: astromatch_web
    restart: always
    # No ports exposed — the host nginx routes traffic via proxy_network
    volumes:
      - ./public:/var/www/public:ro
      - ./docker/nginx/nginx-internal.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - astromatch
      - proxy_network
    depends_on:
      - app

  # ---------------------------------------------------------------------------
  # MySQL Database
  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: astromatch_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-astromatch}
      MYSQL_USER: ${MYSQL_USER:-astromatch}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - astromatch
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: astromatch_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - astromatch
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  astromatch:
    driver: bridge
  proxy_network:
    external: true

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  php_logs:
    driver: local
  nginx_logs:
    driver: local
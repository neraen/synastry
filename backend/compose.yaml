version: '3.8'

services:
  app:
    image: php:8.2-fpm
    container_name: symfony_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - symfony
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql://symfony:symfony@db:3306/symfony

  web:
    image: nginx:alpine
    container_name: symfony_web
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - symfony

  db:
    image: mysql:8.0
    container_name: symfony_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - symfony

  adminer:
    image: adminer
    container_name: symfony_adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - symfony

volumes:
  db_data:

networks:
  symfony:
